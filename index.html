    <div id="h">NEW TRACK</div>
    <div id="v"><div id="yt"></div><canvas id="pc"></canvas><div id="ov"><button class="pb" onclick="start()">START SESSION</button></div></div>
    <div id="ctrl">

        <button class="cb" onclick="spd(0.5, this)">0.5x</button>
        <button class="cb active" onclick="spd(1.0, this)">1.0x</button>
        <button id="pp" class="cb" onclick="togP()">PAUSE</button>
        <button id="mic-btn" class="cb" onclick="activateMic()" style="background: #FF5722;">🎤 MIC</button>
        <button class="cb stop" onclick="reset()">STOP</button>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let data = [];
    const freqs = [329.63, 246.94, 196.0, 146.8, 110.0, 82.4];
    let play = false, startT = 0, pausedT = 0, speed = 1.0, showV = false, ac, an, dArr, ytp;

    function onYouTubeIframeAPIReady() {
        if("") {
            ytp = new YT.Player('yt', {
                videoId: '',
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'modestbranding': 1 },
                events: { 'onReady': () => console.log("YT Ready") }
            });
        }
    }

    async function start() {
        const raw = document.getElementById('pb').getAttribute('data-song');
        data = JSON.parse(raw);
        ac = new (window.AudioContext || window.webkitAudioContext)();
        if (ac.state === 'suspended') await ac.resume();
        document.getElementById('ov').style.display = 'none';
        play = true; startT = performance.now();
        if(ytp && ytp.playVideo) ytp.playVideo();
        data.forEach(n => { n.p = false; n.h = false; });
    }

    async function activateMic() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            const src = ac.createMediaStreamSource(s);
            an = ac.createAnalyser(); an.fftSize = 2048;
            src.connect(an); dArr = new Float32Array(an.fftSize);
            document.getElementById('mic-btn').style.background = '#4CAF50';
            document.getElementById('mic-btn').textContent = '🎤 ON';
        } catch (e) { 
            alert("Microphone access denied or unavailable");
            console.warn("Mic access failed:", e); 
        }
    }

    function reset() {
        play = false;
        document.getElementById('ov').style.display = 'flex';
        if(ytp) { ytp.stopVideo(); ytp.seekTo(0); }
        document.getElementById('pp').textContent = "PAUSE";
        document.getElementById('mic-btn').style.background = '#FF5722';
        document.getElementById('mic-btn').textContent = '🎤 MIC';
    }

    function togP() {
        play = !play;
        document.getElementById('pp').textContent = play ? "PAUSE" : "PLAY";
        if(ytp) play ? ytp.playVideo() : ytp.pauseVideo();
        if(!play) pausedT = performance.now() - startT;
        else startT = performance.now() - pausedT;
    }

    function spd(s, b) {
        speed = s;
        document.querySelectorAll('.cb').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        if(ytp) ytp.setPlaybackRate(s);
    }

    function pNote(s, f) {
        if (!ac) return;
        const o = ac.createOscillator(); const g = ac.createGain();
        o.type = 'triangle'; o.frequency.setValueAtTime(freqs[s] * Math.pow(2, f / 12), ac.currentTime);
        g.gain.setValueAtTime(0.2, ac.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.6);
        o.connect(g); g.connect(ac.destination);
        o.start(); o.stop(ac.currentTime + 0.6);
    }

    function getP() {
        if (!an) return 0;
        an.getFloatTimeDomainData(dArr);
        let rms = 0; for (let i = 0; i < dArr.length; i++) rms += dArr[i] * dArr[i];
        if (Math.sqrt(rms / dArr.length) < 0.015) return 0;
        let bR = 0, bP = -1;
        for (let p = 40; p < 500; p++) {
            let r = 0; for (let i = 0; i < dArr.length - p; i++) r += dArr[i] * dArr[i + p];
            if (r > bR) { bR = r; bP = p; }
        }
        return ac.sampleRate / bP;
    }

    function run() {
        const c = document.getElementById('pc'); const x = c.getContext('2d');
        if (c.width !== c.clientWidth) { c.width = c.clientWidth; c.height = c.clientHeight; }
        x.clearRect(0, 0, c.width, c.height);
        const now = play ? (performance.now() - startT) * speed : pausedT * speed;
        const hX = 120; let cp = getP(); let bg = "#000";
        
        // String names and colors
        const strings = ['e', 'B', 'G', 'D', 'A', 'E'];
        const stringColors = ['#FF6B6B', '#FF8E72', '#FFA500', '#FFD700', '#87CEEB', '#9370DB'];
        
        for (let i = 1; i <= 6; i++) {
            let y = (c.height / 7) * i;
            x.strokeStyle = stringColors[i - 1];
            x.lineWidth = i > 3 ? 4 : 2;
            x.beginPath(); x.moveTo(0, y); x.lineTo(c.width, y); x.stroke();
            
            // Draw string label on the left
            x.fillStyle = stringColors[i - 1];
            x.textAlign = "center";
            x.font = "bold 14px Arial";
            x.fillText(strings[i - 1], hX / 2, y + 5);
        }
        
        x.strokeStyle = "#4CAF50"; x.lineWidth = 4;
        x.beginPath(); x.moveTo(hX, 0); x.lineTo(hX, c.height); x.stroke();
        
        let allFinished = true;
        data.forEach(n => {
            let px = hX + ((n.t - now) * 0.35);
            if (px > -50) allFinished = false; // Note is still on screen or coming up
            
            let tf = freqs[n.s] * Math.pow(2, n.f / 12);
            if (play && px <= hX && !n.p) { pNote(n.s, n.f); n.p = true; }
            if (play && Math.abs(px - hX) < 25 && !n.h && cp > 0) {
                if (Math.abs(cp - tf) < tf * 0.1) n.h = true;
                else bg = "#300";
            }
            if (px > -100 && px < c.width + 100) {
                let y = (c.height / 7) * (n.s + 1);
                x.fillStyle = n.h ? "#FFF" : stringColors[n.s];
                x.beginPath(); x.roundRect(px-35, y-30, 70, 60, 15); x.fill();
                x.fillStyle = "#000"; x.textAlign = "center"; x.font = "bold 30px Arial";
                x.fillText(n.f, px, y + 10);
            }
        });

        // AUTO-LOOP: Restart if everything has passed and 1.5 seconds of silence have occurred
        if (play && allFinished && (now - data[data.length-1].t) > 1500) {
            startT = performance.now();
            if(ytp) ytp.seekTo(0);
            data.forEach(n => { n.p = false; n.h = false; });
        }

        document.body.style.background = bg;
        requestAnimationFrame(run);
    }
    run();
</script>
