<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Studio: Master V6.6</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        body { width: 100vw; height: 100vh; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; }
        #editor-drawer { position: fixed; inset: 0; background: #111; z-index: 9999; padding: 20px; display: flex; flex-direction: column; border: 5px solid #4CAF50; }
        #song-header { height: 40px; background: #0a0a0a; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #222; color: #4CAF50; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        #game-area { flex: 1; position: relative; background: #050505; }
        #game-canvas { width: 100%; height: 100%; display: block; }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 140px; color: #FFD600; font-weight: bold; z-index: 100; pointer-events: none; }
        #control-panel { height: 130px; background: #111; display: flex; padding: 10px; gap: 10px; border-top: 1px solid #222; }
        .big-btn { flex: 1; height: 100%; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .btn-green { background: #4CAF50; } .btn-yellow { background: #FFD600; } .btn-red { background: #F44336; color: #fff; } .btn-cyan { background: #00BCD4; } .btn-dark { background: #333; color: #fff; font-size: 12px; flex: 0.4; }
        input, textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 12px; font-family: monospace; border-radius: 8px; font-size: 16px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="song-header">STUDIO IDLE</div>
    <div id="game-area">
        <div id="countdown"></div>
        <canvas id="game-canvas"></canvas>
    </div>

    <div id="control-panel">
        <button id="main-editor-btn" class="big-btn btn-dark" onclick="openEditor()">EDITOR</button>
        <button id="speed-btn" class="big-btn btn-cyan" onclick="toggleSpeed()">1x SPEED</button>
        <button id="play-btn" class="big-btn btn-green" style="display:none;" onclick="startPlayback()">▶ PLAY</button>
        <button id="record-btn" class="big-btn btn-yellow" style="display:none;" onclick="uiStartRecord()">● REC</button>
        <button id="tap-btn" class="big-btn btn-yellow" style="display:none;" onmousedown="handleTap(event)" ontouchstart="handleTap(event)">TAP!</button>
        <button id="stop-btn" class="big-btn btn-red" style="display:none;" onclick="uiStop()">STOP</button>
    </div>

    <div id="editor-drawer">
        <h2 style="color:#4CAF50; margin-bottom:15px;">Admin: Song Builder</h2>
        <input id="in-name" placeholder="Song Name">
        <textarea id="tab-input" style="flex:1;" placeholder="Paste Tab Here..."></textarea>
        <div style="display:flex; gap:10px; height:60px;">
            <button class="big-btn btn-green" onclick="loadNewTab()">LOAD TAB</button>
            <button class="big-btn btn-red" onclick="resetAll()">WIPE ALL</button>
        </div>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let currentNotes = [], songMeta = { name: "" };
    let isRecording = false, isPlaying = false, startTime = 0, tapIndex = 0, speedMult = 1.0;

    function openEditor() { document.getElementById('editor-drawer').style.display = 'flex'; }
    function closeEditor() { document.getElementById('editor-drawer').style.display = 'none'; }
    function resetAll() { currentNotes = []; updateUI(); document.getElementById('song-header').textContent = "STUDIO IDLE"; }

    function playNote(s, f) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        const freqs = [329.63, 246.94, 196.00, 146.83, 110.00, 82.41];
        o.type = 'triangle'; o.frequency.setValueAtTime(freqs[s] * Math.pow(2, f/12), audioCtx.currentTime);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.6);
    }

    function loadNewTab() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        songMeta.name = document.getElementById('in-name').value || "New Riff";
        document.getElementById('song-header').textContent = songMeta.name;
        const raw = document.getElementById('tab-input').value;
        const stringMap = { 'e':0, 'B':1, 'G':2, 'D':3, 'A':4, 'E':5 };
        let temp = [];
        raw.split('\n').forEach(line => {
            let char = line.trim()[0];
            if(stringMap[char] !== undefined) {
                let sIdx = stringMap[char];
                for(let i=0; i<line.length; i++) {
                    if(!isNaN(line[i]) && line[i] !== ' ' && line[i] !== '-') {
                        temp.push({ s: sIdx, f: parseInt(line[i]), t: 0, raw: i, played: false });
                    }
                }
            }
        });
        currentNotes = temp.sort((a,b) => a.raw - b.raw);
        updateUI(); closeEditor();
    }

    function updateUI() {
        const hasTiming = currentNotes.length > 0 && currentNotes[0].t > 0;
        document.getElementById('play-btn').style.display = (hasTiming && !isPlaying && !isRecording) ? 'flex' : 'none';
        document.getElementById('record-btn').style.display = (currentNotes.length > 0 && !hasTiming && !isPlaying && !isRecording) ? 'flex' : 'none';
    }

    function uiStartRecord() {
        let count = 3; const cd = document.getElementById('countdown');
        document.getElementById('record-btn').style.display = 'none';
        const timer = setInterval(() => {
            cd.textContent = count > 0 ? count : (count === 0 ? "GO!" : "");
            if(count === -1) {
                clearInterval(timer); isRecording = true; tapIndex = 0; startTime = performance.now();
                document.getElementById('tap-btn').style.display = 'flex';
                document.getElementById('stop-btn').style.display = 'flex';
            }
            count--;
        }, 800);
    }

    function handleTap(e) {
        if(e) e.preventDefault();
        if(!isRecording || tapIndex >= currentNotes.length) return;
        currentNotes[tapIndex].t = (performance.now() - startTime) * speedMult;
        playNote(currentNotes[tapIndex].s, currentNotes[tapIndex].f);
        tapIndex++;
        if(tapIndex === currentNotes.length) uiStop();
    }

    function startPlayback() {
        currentNotes.forEach(n => n.played = false);
        isPlaying = true; startTime = performance.now();
        document.getElementById('play-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'flex';
    }

    function uiStop() { 
        isRecording = false; isPlaying = false; 
        document.getElementById('tap-btn').style.display = 'none'; 
        document.getElementById('stop-btn').style.display = 'none';
        updateUI(); 
    }

    function draw() {
        const canvas = document.getElementById('game-canvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        if(canvas.width !== canvas.clientWidth) { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const now = (isPlaying ? (performance.now() - startTime) : -1000) * speedMult;
        const hitX = 120;

        for(let i=1; i<=6; i++) {
            let y = (canvas.height / 7) * i;
            ctx.strokeStyle = "#222"; ctx.lineWidth = i > 3 ? 4 : 2;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
        ctx.strokeStyle = "#4CAF50"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(hitX, 0); ctx.lineTo(hitX, canvas.height); ctx.stroke();

        currentNotes.forEach((n, idx) => {
            let x = -100;
            if (isRecording) {
                if (idx === tapIndex) x = hitX + 60;
            } else if (n.t > 0) {
                x = hitX + ((n.t - now) * 0.35);
                if (isPlaying && x <= hitX && !n.played) { playNote(n.s, n.f); n.played = true; }
            }
            
            if(x > -100 && x < canvas.width + 100) {
                let y = (canvas.height / 7) * (n.s + 1);
                ctx.fillStyle = n.played ? "#fff" : "#4CAF50";
                ctx.beginPath(); ctx.roundRect(x - 35, y - 30, 70, 60, 15); ctx.fill();
                ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.font = "bold 34px Arial"; ctx.fillText(n.f, x, y + 11);
            }
        });
        requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
</script>
</body>
</html>
