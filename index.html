<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Studio: Master V5.6</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        body { width: 100vw; height: 100vh; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; position: relative; }
        
        /* 1. THE EDITOR (Force to the absolute front) */
        #editor-drawer { 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000; 
            z-index: 9999 !important; /* Higher than everything else */
            padding: 20px; 
            display: none; /* Controlled by JS */
            flex-direction: column; 
            border: 4px solid #4CAF50; /* Visual confirmation it's open */
        }

        /* 2. THE HEADER */
        #song-header { height: 40px; background: #0a0a0a; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #222; color: #4CAF50; font-weight: bold; font-size: 14px; text-transform: uppercase; z-index: 10; }

        /* 3. THE GAME AREA */
        #game-area { flex: 1; position: relative; background: #050505; z-index: 5; }
        #game-canvas { width: 100%; height: 100%; display: block; }
        
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 140px; color: #FFD600; font-weight: bold; z-index: 100; pointer-events: none; }

        /* 4. THE CONTROLS */
        #control-panel { height: 130px; background: #111; display: flex; padding: 10px; gap: 10px; z-index: 200; border-top: 1px solid #222; }
        
        .big-btn { flex: 1; height: 100%; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .btn-green { background: #4CAF50; } 
        .btn-yellow { background: #FFD600; } 
        .btn-red { background: #F44336; color: #fff; }
        .btn-cyan { background: #00BCD4; color: #000; }
        .btn-dark { background: #333; color: #fff; font-size: 12px; flex: 0.4; }

        .input-group { margin-bottom: 15px; }
        label { display: block; color: #4CAF50; font-size: 11px; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; background: #111; color: #fff; border: 1px solid #333; padding: 12px; font-family: monospace; border-radius: 8px; font-size: 16px; }
        
        .pulse { animation: pulse-anim 0.2s ease-out; }
        @keyframes pulse-anim { 0% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.5; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="song-header">STUDIO READY</div>
    <div id="game-area">
        <div id="countdown"></div>
        <canvas id="game-canvas"></canvas>
    </div>
    <div id="control-panel">
        <button class="big-btn btn-dark" style="z-index:10000;" onclick="openEditor()">EDITOR</button>
        <button id="speed-btn" class="big-btn btn-cyan" onclick="toggleSpeed()">1x SPEED</button>
        <button id="play-btn" class="big-btn btn-green hidden" onclick="startPlayback()">▶ PLAY</button>
        <button id="record-btn" class="big-btn btn-yellow hidden" onclick="uiStartRecord()">● REC RHYTHM</button>
        <button id="tap-btn" class="big-btn btn-yellow hidden" onmousedown="handleTap(event)" ontouchstart="handleTap(event)">TAP NOW!</button>
        <button id="stop-btn" class="big-btn btn-red hidden" onclick="uiStop()">STOP</button>
    </div>

    <div id="editor-drawer">
        <h2 style="color:#4CAF50; margin-bottom:15px;">Admin: Song Builder</h2>
        <div class="input-group">
            <label>SONG NAME</label>
            <input id="in-name" placeholder="e.g. Day Tripper">
        </div>
        <div class="input-group" style="flex:1; display:flex; flex-direction:column;">
            <label>TABLATURE</label>
            <textarea id="tab-input" style="flex:1;" placeholder="e|-------0-3-5---"></textarea>
        </div>
        <div style="display:flex; gap:10px; height:60px;">
            <button class="big-btn btn-green" onclick="loadNewTab()">1. LOAD TAB</button>
            <button class="big-btn btn-dark" onclick="closeEditor()">CLOSE</button>
        </div>
        <div id="bake-section" style="display:none; margin-top:20px; border-top:1px solid #333; padding-top:20px;">
            <button class="big-btn btn-blue" style="height:70px; background:#2196F3; color:white;" onclick="downloadDadFile()">📥 DOWNLOAD DAD-FILE</button>
        </div>
    </div>

<script>
    let currentNotes = [], songMeta = { name: "" };
    let isRecording = false, isPlaying = false, startTime = 0, tapIndex = 0;
    let speedMult = 1.0;
    let audioCtx;

    window.onload = () => {
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        requestAnimationFrame(draw);
    };

    function resizeCanvas() { const c = document.getElementById('game-canvas'); c.width = c.clientWidth; c.height = c.clientHeight; }
    
    // NEW EXPLICIT OPEN/CLOSE FUNCTIONS
    function openEditor() { document.getElementById('editor-drawer').style.display = 'flex'; }
    function closeEditor() { document.getElementById('editor-drawer').style.display = 'none'; }

    function toggleSpeed() { speedMult = (speedMult === 1.0) ? 0.5 : 1.0; document.getElementById('speed-btn').textContent = speedMult + "x SPEED"; }

    function loadNewTab() {
        songMeta.name = document.getElementById('in-name').value || "Untitled Riff";
        document.getElementById('song-header').textContent = songMeta.name;
        
        const raw = document.getElementById('tab-input').value;
        const stringMap = { 'e':0, 'B':1, 'G':2, 'D':3, 'A':4, 'E':5 };
        let temp = [];
        raw.split('\n').forEach(line => {
            let char = line.trim()[0];
            if(stringMap[char] !== undefined) {
                let sIdx = stringMap[char];
                for(let i=0; i<line.length; i++) {
                    if(!isNaN(line[i]) && line[i] !== ' ' && line[i] !== '-') {
                        temp.push({ s: sIdx, f: parseInt(line[i]), t: 0, played: false, raw: i });
                    }
                }
            }
        });
        currentNotes = temp.sort((a,b) => a.raw - b.raw);
        updateUI();
        closeEditor();
    }

    function updateUI() {
        const hasTiming = currentNotes.length > 0 && currentNotes[0].t > 0;
        document.getElementById('play-btn').style.display = (!hasTiming || isPlaying || isRecording) ? 'none' : 'flex';
        document.getElementById('record-btn').style.display = (currentNotes.length === 0 || hasTiming || isPlaying || isRecording) ? 'none' : 'flex';
        document.getElementById('bake-section').style.display = hasTiming ? 'block' : 'none';
    }

    function uiStartRecord() {
        let count = 3;
        const cd = document.getElementById('countdown');
        document.getElementById('record-btn').style.display = 'none';

        const timer = setInterval(() => {
            cd.classList.remove('pulse'); void cd.offsetWidth; cd.classList.add('pulse');
            if (count > 0) { cd.textContent = count; cd.style.color = "#FFD600"; }
            else if (count === 0) { cd.textContent = "GO!"; cd.style.color = "#4CAF50"; }
            else {
                clearInterval(timer); cd.textContent = "";
                isRecording = true; tapIndex = 0; startTime = performance.now();
                document.getElementById('tap-btn').style.display = 'flex';
                document.getElementById('stop-btn').style.display = 'flex';
            }
            count--;
        }, 800);
    }

    function handleTap(e) {
        if(e) e.preventDefault();
        if(!isRecording || tapIndex >= currentNotes.length) return;
        currentNotes[tapIndex].t = (performance.now() - startTime) * speedMult;
        tapIndex++;
        if(tapIndex === currentNotes.length) uiStop();
    }

    async function startPlayback() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isPlaying = true; startTime = performance.now();
        document.getElementById('play-btn').style.display = 'none';
