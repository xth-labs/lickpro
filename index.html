<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Studio: Master Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        body { width: 100vw; height: 100vh; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; }
        #game-area { flex: 1; position: relative; background: #050505; border-bottom: 2px solid #222; }
        #game-canvas { width: 100%; height: 100%; display: block; }
        #control-panel { height: 130px; background: #111; display: flex; padding: 10px; gap: 10px; z-index: 100; }
        .big-btn { flex: 1; height: 100%; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .btn-green { background: #4CAF50; } 
        .btn-yellow { background: #FFD600; } 
        .btn-red { background: #F44336; color: #fff; }
        .btn-blue { background: #2196F3; color: #fff; }
        .btn-dark { background: #333; color: #fff; font-size: 12px; flex: 0.4; }
        #editor-drawer { position: absolute; inset: 0; background: #000; z-index: 200; padding: 20px; display: flex; flex-direction: column; }
        textarea { flex: 1; background: #111; color: #4CAF50; border: 1px solid #333; padding: 10px; font-family: monospace; font-size: 14px; margin-bottom: 10px; border-radius: 8px; }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: #4CAF50; font-weight: bold; z-index: 300; pointer-events: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="countdown"></div>
        <canvas id="game-canvas"></canvas>

        <div id="editor-drawer" class="hidden">
            <h2 style="color:#4CAF50; margin-bottom:10px;">Admin: Song Builder</h2>
            <textarea id="tab-input" placeholder="e|-------0-3-5---"></textarea>
            <div style="display:flex; gap:10px; height:50px; margin-bottom:20px;">
                <button class="big-btn btn-green" onclick="loadNewTab()">1. LOAD TAB</button>
                <button class="big-btn btn-dark" onclick="toggleEditor()">CLOSE</button>
            </div>
            
            <div id="bake-section" class="hidden" style="border-top: 1px solid #333; padding-top: 20px;">
                <p style="margin-bottom:10px; color:#aaa;">Rhythm Recorded! Now export for Dad:</p>
                <button class="big-btn btn-blue" style="height:60px;" onclick="downloadDadFile()">📥 DOWNLOAD DAD-FILE (.html)</button>
            </div>
        </div>
    </div>

    <div id="control-panel">
        <button class="big-btn btn-dark" onclick="toggleEditor()">TAB EDITOR</button>
        <button id="play-btn" class="big-btn btn-green" onclick="startPlayback()">▶ PLAY TEST</button>
        <button id="record-btn" class="big-btn btn-yellow hidden" onclick="uiStartRecord()">● REC RHYTHM</button>
        <button id="tap-btn" class="big-btn btn-yellow hidden" onmousedown="handleTap(event)" ontouchstart="handleTap(event)">TAP!</button>
        <button id="stop-btn" class="big-btn btn-red hidden" onclick="uiStop()">STOP</button>
    </div>

<script>
    let currentNotes = [];
    let isRecording = false, isPlaying = false, startTime = 0, tapIndex = 0;
    let audioCtx, analyser, micStream;
    const stringBaseFreqs = [329.63, 246.94, 196.00, 146.83, 110.00, 82.41];

    window.onload = () => {
        const saved = localStorage.getItem('master_studio_v5');
        if(saved) { currentNotes = JSON.parse(saved); updateUI(); }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        requestAnimationFrame(draw);
    };

    function resizeCanvas() { const c = document.getElementById('game-canvas'); c.width = c.clientWidth; c.height = c.clientHeight; }
    function toggleEditor() { document.getElementById('editor-drawer').classList.toggle('hidden'); }

    function loadNewTab() {
        const raw = document.getElementById('tab-input').value;
        const stringMap = { 'e':0, 'B':1, 'G':2, 'D':3, 'A':4, 'E':5 };
        let temp = [];
        raw.split('\n').forEach(line => {
            let char = line.trim()[0];
            if(stringMap[char] !== undefined) {
                let sIdx = stringMap[char];
                for(let i=0; i<line.length; i++) {
                    if(!isNaN(line[i]) && line[i] !== ' ' && line[i] !== '-') {
                        temp.push({ s: sIdx, f: parseInt(line[i]), t: 0, played: false, raw: i });
                    }
                }
            }
        });
        currentNotes = temp.sort((a,b) => a.raw - b.raw);
        localStorage.setItem('master_studio_v5', JSON.stringify(currentNotes));
        updateUI();
        toggleEditor();
    }

    function updateUI() {
        const hasTiming = currentNotes.length > 0 && currentNotes[0].t > 0;
        document.getElementById('play-btn').classList.toggle('hidden', !hasTiming || isPlaying || isRecording);
        document.getElementById('record-btn').classList.toggle('hidden', hasTiming || isPlaying || isRecording);
        document.getElementById('bake-section').classList.toggle('hidden', !hasTiming);
    }

    function downloadDadFile() {
        const fileName = prompt("Name this song (e.g. day-tripper):", "my-song");
        if(!fileName) return;

        // The "Dad Template" embedded as a string
        const template = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Guitar: ${fileName}</title><style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;overflow:hidden;}body{width:100vw;height:100vh;background:#000;color:#fff;font-family:'Arial Black',sans-serif;display:flex;flex-direction:column;}#game-area{flex:1;position:relative;background:#050505;border-bottom:5px solid #222;}#game-canvas{width:100%;height:100%;display:block;}#control-panel{height:140px;background:#111;display:flex;padding:15px;gap:15px;}.big-btn{flex:1;height:100%;border:none;border-radius:20px;font-size:28px;font-weight:bold;color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;text-transform:uppercase;box-shadow:0 6px 0 #333;}.big-btn:active{transform:translateY(4px);box-shadow:none;}.btn-green{background:#4CAF50;}.btn-red{background:#F44336;color:#fff;}.btn-blue{background:#2196F3;font-size:16px;flex:0.4;color:white;}.loop-active{border:5px solid white;box-shadow:0 0 20px #2196F3;}#countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:160px;color:#4CAF50;z-index:100;pointer-events:none;}.hidden{display:none!important;}</style></head><body><div id="game-area"><div id="countdown"></div><canvas id="game-canvas"></canvas></div><div id="control-panel"><button id="loop-btn" class="big-btn btn-blue" onclick="toggleLoop()">LOOP: OFF</button><button id="play-btn" class="big-btn btn-green" onclick="startSong()">▶ START</button><button id="stop-btn" class="big-btn btn-red hidden" onclick="stopSong()">STOP</button></div><script>const SONG_DATA = ${JSON.stringify(currentNotes)};let isPlaying=false,isLooping=false,startTime=0,audioCtx,analyser,micStream;const stringBaseFreqs=[329.63,246.94,196,146.83,110,82.41];function toggleLoop(){isLooping=!isLooping;const b=document.getElementById('loop-btn');b.textContent=isLooping?"LOOP: ON":"LOOP: OFF";b.classList.toggle('loop-active',isLooping)}async function startSong(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext);try{if(audioCtx.state==='suspended')await audioCtx.resume();micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false}});const source=audioCtx.createMediaStreamSource(micStream);analyser=audioCtx.createAnalyser();analyser.fftSize=2048;source.connect(analyser)}catch(e){}let count=3;const cd=document.getElementById('countdown');document.getElementById('play-btn').classList.add('hidden');const timer=setInterval(()=>{cd.textContent=count>0?count:"GO!";if(count===-1){clearInterval(timer);cd.textContent="";isPlaying=true;startTime=performance.now();SONG_DATA.forEach(n=>n.played=false);document.getElementById('stop-btn').classList.remove('hidden')}count--},800)}function stopSong(){isPlaying=false;document.getElementById('stop-btn').classList.add('hidden');document.getElementById('play-btn').classList.remove('hidden');document.body.style.backgroundColor="#000"}function playMidi(f){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+0.2);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.2)}function autoCorrelate(buf,sr){let rms=0;for(let i=0;i<buf.length;i++)rms+=buf[i]*buf[i];if(Math.sqrt(rms/buf.length)<0.01)return-1;let r1=0,r2=buf.length-1,th=0.2;for(let i=0;i<buf.length/2;i++)if(Math.abs(buf[i])<th){r1=i;break}for(let i=1;i<buf.length/2;i++)if(Math.abs(buf[buf.length-i])<th){r2=buf.length-i;break}const b=buf.slice(r1,r2);const c=new Array(b.length).fill(0);for(let i=0;i<b.length;i++)for(let j=0;j<b.length-i;j++)c[i]=c[i]+b[j]*b[j+i];let d=0;while(c[d]>c[d+1])d++;let maxv=-1,maxp=-1;for(let i=d;i<b.length;i++)if(c[i]>maxv){maxv=c[i];maxp=i}return sr/maxp}function draw(){const canvas=document.getElementById('game-canvas');if(canvas.width!==canvas.clientWidth){canvas.width=canvas.clientWidth;canvas.height=canvas.clientHeight}const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);const now=isPlaying?(performance.now()-startTime):-1000;for(let i=1;i<=6;i++){let y=(canvas.height/7)*i;ctx.strokeStyle="#333";ctx.lineWidth=i>3?5:2;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()}ctx.strokeStyle="#4CAF50";ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(100,0);ctx.lineTo(100,canvas.height);ctx.stroke();if(isPlaying&&analyser){const buf=new Float32Array(analyser.fftSize);analyser.getFloatTimeDomainData(buf);const freq=autoCorrelate(buf,audioCtx.sampleRate);const expected=SONG_DATA.filter(n=>Math.abs(n.t-now)<180);if(freq>0&&expected.length>0){let match=expected.some(en=>{const target=stringBaseFreqs[en.s]*Math.pow(2,en.f/12);return Math.abs(freq-target)/target<0.1});document.body.style.backgroundColor=match?"#003300":"#330000"}else{document.body.style.backgroundColor="#000"}if(now>SONG_DATA[SONG_DATA.length-1].t+2000){if(isLooping)startTime=performance.now();else stopSong()}}SONG_DATA.forEach((n)=>{let x=100+(n.t-now)*0.35;if(x>-100&&x<canvas.width+100){let y=(canvas.height/7)*(n.s+1);if(isPlaying&&!n.played&&Math.abs(n.t-now)<30){playMidi(stringBaseFreqs[n.s]*Math.pow(2,n.f/12));n.played=true}ctx.fillStyle=(Math.abs(x-100)<25)?"#fff":"#4CAF50";ctx.beginPath();ctx.roundRect(x-45,y-40,90,80,20);ctx.fill();ctx.fillStyle="#000";ctx.textAlign="center";ctx.textBaseline="middle";ctx.font="bold 45px Arial";ctx.fillText(n.f,x,y)}});requestAnimationFrame(draw)}requestAnimationFrame(draw);<\/script></body></html>`;

        const blob = new Blob([template], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fileName + ".html";
        a.click();
    }

    async function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        if (!micStream) {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false } });
                const source = audioCtx.createMediaStreamSource(micStream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);
            } catch (e) {}
        }
    }

    function playMidi(f) {
        if (!audioCtx) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'triangle'; o.frequency.value = f;
        g.gain.setValueAtTime(0.2, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.2);
    }

    function uiStartRecord() {
        let count = 3;
        const cd = document.getElementById('countdown');
        const timer = setInterval(() => {
            cd.textContent = count > 0 ? count : "GO!";
            if(count === -1) {
                clearInterval(timer);
                cd.textContent = "";
                isRecording = true; tapIndex = 0; startTime = performance.now();
                document.getElementById('tap-btn').classList.remove('hidden');
                document.getElementById('stop-btn').classList.remove('hidden');
                document.getElementById('record-btn').classList.add('hidden');
            }
            count--;
        }, 800);
    }

    function handleTap(e) {
        if(e) e.preventDefault();
        if(!isRecording || tapIndex >= currentNotes.length) return;
        currentNotes[tapIndex].t = performance.now() - startTime;
        tapIndex++;
        if(tapIndex === currentNotes.length) uiStop();
    }

    async function startPlayback() { await initAudio(); isPlaying = true; startTime = performance.now(); currentNotes.forEach(n => n.played = false); document.getElementById('play-btn').classList.add('hidden'); document.getElementById('stop-btn').classList.remove('hidden'); }
    function uiStop() { isRecording = false; isPlaying = false; localStorage.setItem('master_studio_v5', JSON.stringify(currentNotes)); document.getElementById('tap-btn').classList.add('hidden'); document.getElementById('stop-btn').classList.add('hidden'); document.body.style.backgroundColor = "#000"; updateUI(); }

    function autoCorrelate(buf, sr) {
        let rms = 0; for (let i=0; i<buf.length; i++) rms += buf[i]*buf[i];
        if (Math.sqrt(rms/buf.length) < 0.01) return -1;
        let r1=0, r2=buf.length-1, th=0.2;
        for (let i=0; i<buf.length/2; i++) if (Math.abs(buf[i])<th) { r1=i; break; }
        for (let i=1; i<buf.length/2; i++) if (Math.abs(buf[buf.length-i])<th) { r2=buf.length-i; break; }
        const b = buf.slice(r1,r2);
        const c = new Array(b.length).fill(0);
        for (let i=0; i<b.length; i++) for (let j=0; j<b.length-i; j++) c[i] = c[i] + b[j]*b[j+i];
        let d=0; while (c[d]>c[d+1]) d++;
        let maxv=-1, maxp=-1;
        for (let i=d; i<b.length; i++) if (c[i]>maxv) { maxv=c[i]; maxp=i}
        return sr/maxp;
    }

    function draw() {
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const now = performance.now() - startTime;
        for(let i=1; i<=6; i++) {
            let y = (canvas.height / 7) * i;
            ctx.strokeStyle = "#222"; ctx.lineWidth = i > 3 ? 4 : 2 
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
        ctx.strokeStyle = "#4CAF50"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(100, 0); ctx.lineTo(100, canvas.height); ctx.stroke(); 
        if (isPlaying && analyser) {
            const buf = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buf);
            const freq = autoCorrelate(buf, audioCtx.sampleRate);
            const expected = currentNotes.filter(n => Math.abs(n.t - now) < 150);
            if (freq > 0 && expected.length > 0) {
                let match = expected.some(en => {
                    const target = stringBaseFreqs[en.s] * Math.pow(2, en.f / 12);
                    return Math.abs(freq - target) / target < 0.08;
                });
                document.body.style.backgroundColor = match ? "#003300" : "#330000";
            } else { document.body.style.backgroundColor = "#000"; }
        }
        currentNotes.forEach((n) => {
            let x = isRecording ? (n.t > 0 ? 100 + (n.t * 0.35) : -200) : (isPlaying ? 100 + (n.t - now) * 0.35 : -200);
            if(x > -100 && x < canvas.width + 100) {
                let y = (canvas.height / 7) * (n.s + 1);
                if (isPlaying && !n.played && Math.abs(n.t - now) < 30) {
                    playMidi(stringBaseFreqs[n.s] * Math.pow(2, n.f / 12));
                    n.played = true;
                }
                ctx.fillStyle = (isPlaying && Math.abs(x - 100) < 15) ? "#fff" : "#4CAF50";
                ctx.beginPath(); ctx.roundRect(x - 35, y - 30, 70, 60, 15); ctx.fill();
                ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.font = "bold 32px Arial"; ctx.fillText(n.f, x, y);
            }
        });
        requestAnimationFrame(draw);
    }
</script>
</body>
</html>
