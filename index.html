<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAYER: DAY RIPPER</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #h { height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #4CAF50; background: #111; font-weight: bold; position: relative; }
        #fs-btn { position: absolute; right: 10px; background: #333; border: 1px solid #4CAF50; color: #4CAF50; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        #v { flex: 1; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; position: absolute; z-index: 5; pointer-events: none; }
        #ov { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 100; }
        .pb { padding: 20px 40px; background: #4CAF50; color: #000; border: none; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; }
        #ctrl { height: 80px; background: #111; display: flex; align-items: center; padding: 0 10px; gap: 10px; border-top: 2px solid #222; }
        .cb { flex: 1; padding: 15px; background: #333; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .stop { background: #F44336; }
        .active { background: #4CAF50; color: #000; }
    </style>
</head>
<body id="pb" data-song='[{"s":3,"f":2,"t":588.4},{"s":3,"f":4,"t":1133.1},{"s":2,"f":2,"t":1630.9},{"s":2,"f":4,"t":2118.6},{"s":1,"f":2,"t":2568.1},{"s":1,"f":5,"t":3037.4},{"s":0,"f":2,"t":3532.7},{"s":0,"f":5,"t":3950.5}]'>
    
    <div id="h">
        DAY RIPPER 
        <button id="fs-btn" onclick="toggleFS()">GO FULLSCREEN</button>
    </div>

    <div id="v">
        <canvas id="pc"></canvas>
        <div id="ov"><button class="pb" onclick="start()">START SESSION</button></div>
    </div>

    <div id="ctrl">
        <button class="cb" onclick="spd(0.5, this)">0.5x</button>
        <button class="cb active" onclick="spd(1.0, this)">1.0x</button>
        <button id="pp" class="cb" onclick="togP()">PAUSE</button>
        <button class="cb stop" onclick="reset()">STOP</button>
    </div>

<script>
    let data = [];
    const freqs = [329.63, 246.94, 196.0, 146.8, 110.0, 82.4];
    let play = false, startT = 0, pausedT = 0, speed = 1.0, ac, an, dArr;

    function toggleFS() {
        const doc = document.documentElement;
        if (!document.fullscreenElement) {
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            document.getElementById('fs-btn').textContent = "EXIT FS";
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
            document.getElementById('fs-btn').textContent = "GO FULLSCREEN";
        }
    }

    async function start() {
        // Trigger Fullscreen on first interaction
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

        data = JSON.parse(document.getElementById('pb').getAttribute('data-song'));
        ac = new (window.AudioContext || window.webkitAudioContext)();
        if (ac.state === 'suspended') await ac.resume();
        
        try {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            const src = ac.createMediaStreamSource(s);
            an = ac.createAnalyser(); an.fftSize = 2048;
            src.connect(an); dArr = new Float32Array(an.fftSize);
        } catch (e) { console.warn("Mic Access Denied"); }

        document.getElementById('ov').style.display = 'none';
        play = true; startT = performance.now();
        data.forEach(n => { n.p = false; n.h = false; });
    }

    function pNote(s, f) {
        if (!ac) return;
        const o = ac.createOscillator(); const g = ac.createGain();
        o.type = 'triangle'; o.frequency.setValueAtTime(freqs[s] * Math.pow(2, f / 12), ac.currentTime);
        g.gain.setValueAtTime(0.2, ac.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.6);
        o.connect(g); g.connect(ac.destination);
        o.start(); o.stop(ac.currentTime + 0.6);
    }

    function reset() { play = false; document.getElementById('ov').style.display = 'flex'; }
    
    function togP() { 
        play = !play; 
        if(!play) pausedT = performance.now() - startT; 
        else startT = performance.now() - pausedT; 
        document.getElementById('pp').textContent = play ? "PAUSE" : "PLAY";
    }

    function spd(s, b) { 
        speed = s; 
        document.querySelectorAll('.cb').forEach(btn => btn.classList.remove('active')); 
        b.classList.add('active'); 
    }

    function getP() {
        if (!an) return 0;
        an.getFloatTimeDomainData(dArr);
        let rms = 0; for (let i = 0; i < dArr.length; i++) rms += dArr[i] * dArr[i];
        if (Math.sqrt(rms / dArr.length) < 0.01) return 0;
        let bR = 0, bP = -1;
        for (let p = 40; p < 500; p++) {
            let r = 0; for (let i = 0; i < dArr.length - p; i++) r += dArr[i] * dArr[i + p];
            if (r > bR) { bR = r; bP = p; }
        }
        return bP > 0 ? ac.sampleRate / bP : 0;
    }

    function run() {
        const c = document.getElementById('pc'); const x = c.getContext('2d');
        if (c.width !== c.clientWidth || c.height !== c.clientHeight) {
            c.width = c.clientWidth; c.height = c.clientHeight;
        }
        x.clearRect(0, 0, c.width, c.height);
        const now = play ? (performance.now() - startT) * speed : pausedT * speed;
        const hX = 120; let cp = getP(); 
        
        // Draw String Lines
        for (let i = 1; i <= 6; i++) {
            let y = (c.height / 7) * i; x.strokeStyle = "#222"; x.lineWidth = 4;
            x.beginPath(); x.moveTo(0, y); x.lineTo(c.width, y); x.stroke();
        }
        // Draw Hit Line
        x.strokeStyle = "#4CAF50"; x.lineWidth = 4;
        x.beginPath(); x.moveTo(hX, 0); x.lineTo(hX, c.height); x.stroke();

        let allFinished = true;
        let sortedNotes = data.filter(n => (hX + ((n.t - now) * 0.35)) > -100).sort((a,b) => a.t - b.t);

        // --- RHYTHM GUIDE LINE ---
        if (play && sortedNotes.length > 1) {
            let n1 = sortedNotes.find(n => (hX + ((n.t - now) * 0.35)) <= hX + 50 && (hX + ((n.t - now) * 0.35)) >= -50);
            let n2 = sortedNotes.find(n => (hX + ((n.t - now) * 0.35)) > (n1 ? hX + ((n1.t - now) * 0.35) : hX));
            if (n1 && n2) {
                let x1 = hX + ((n1.t - now) * 0.35); let y1 = (c.height / 7) * (n1.s + 1);
                let x2 = hX + ((n2.t - now) * 0.35); let y2 = (c.height / 7) * (n2.s + 1);
                x.setLineDash([5, 8]); x.strokeStyle = "rgba(76, 175, 80, 0.4)"; x.lineWidth = 2;
                x.beginPath(); x.moveTo(x1, y1); x.lineTo(x2, y2); x.stroke(); x.setLineDash([]);
            }
        }

        data.forEach(n => {
            let px = hX + ((n.t - now) * 0.35);
            if (px > -60) allFinished = false; 
            
            let tf = freqs[n.s] * Math.pow(2, n.f / 12);
            
            // Sound Playback trigger
            if (play && px <= hX && !n.p) { pNote(n.s, n.f); n.p = true; }

            // Detection Logic (Positive Only)
            if (play && px <= hX + 25 && px >= hX - 60 && !n.h && cp > 0) {
                if (Math.abs(cp - tf) < tf * 0.1) n.h = true;
            }

            // Draw Note
            if (px > -100 && px < c.width + 100) {
                let y = (c.height / 7) * (n.s + 1);
                x.fillStyle = n.h ? "#FFF" : "#4CAF50";
                x.beginPath(); x.roundRect(px-35, y-30, 70, 60, 15); x.fill();
                x.fillStyle = "#000"; x.textAlign = "center"; x.font = "bold 30px Arial";
                x.fillText(n.f, px, y + 10);
            }
        });

        // Auto Loop
        if (play && allFinished && data.length > 0) {
            startT = performance.now();
            data.forEach(n => { n.p = false; n.h = false; });
        }
        requestAnimationFrame(run);
    }
    run();
</script>
</body>
</html>
