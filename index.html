<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAZ-TECH: Admin Studio V3.2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        #admin-panel { height: 45%; background: #111; border-bottom: 3px solid #4CAF50; padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        
        /* Fullscreen button styling */
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        #fs-btn { background: #333; border: 1px solid #4CAF50; color: #4CAF50; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        .input-row { display: flex; gap: 10px; }
        input, textarea { background: #000; color: #4CAF50; border: 1px solid #333; padding: 12px; font-family: 'Courier New', monospace; border-radius: 5px; font-size: 14px; outline: none; }
        textarea { flex: 1; resize: none; border-color: #222; }
        #game-area { flex: 1; position: relative; background: #050505; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; color: #FFD600; font-weight: bold; pointer-events: none; text-shadow: 0 0 20px rgba(255,214,0,0.5); }
        #controls { height: 90px; background: #111; display: flex; padding: 10px; gap: 10px; border-top: 1px solid #222; }
        .btn { flex: 1; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: opacity 0.2s; }
        .btn:active { opacity: 0.7; }
        .btn-load { background: #4CAF50; color: #000; }
        .btn-rec { background: #FFD600; color: #000; }
        .btn-tap { background: #FFD600; color: #000; font-size: 28px; display: none; box-shadow: 0 0 15px #FFD600; }
        .btn-bake { background: #E91E63; color: #fff; display: none; }
        .btn-stop { background: #F44336; color: #fff; display: none; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div class="header-row">
            <span style="font-size: 10px; color: #666;">BAZ-TECH STUDIO</span>
            <button id="fs-btn" onclick="toggleFS()">FULLSCREEN</button>
        </div>
        <div class="input-row">
            <input id="in-name" style="flex:1" placeholder="SONG NAME">
            <input id="yt-url" style="flex:1.5" placeholder="YouTube URL (Optional)">
            <button class="btn btn-load" onclick="loadTab()">1. LOAD TAB</button>
        </div>
        <textarea id="tab-input" placeholder="Paste Guitar Tab here..."></textarea>
    </div>

    <div id="game-area">
        <div id="countdown"></div>
        <canvas id="game-canvas"></canvas>
    </div>

    <div id="controls">
        <button id="rec-btn" class="btn btn-rec" style="display:none;" onclick="startRecording()">2. RECORD RHYTHM</button>
        <button id="tap-btn" class="btn btn-tap" onmousedown="handleTap(event)" ontouchstart="handleTap(event)">TAP!</button>
        <button id="bake-btn" class="btn btn-bake" onclick="bakePlayer()">3. BAKE PLAYER (AUTO-LOOP)</button>
        <button id="stop-btn" class="btn btn-stop" onclick="stopRecording()">STOP</button>
    </div>

<script>
    let currentNotes = [], songName = "", isRecording = false, recordingStartTime = 0, currentTapIndex = 0;

    // Only added this function
    function toggleFS() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
        } else {
            document.exitFullscreen();
        }
    }

    function loadTab() {
        songName = document.getElementById('in-name').value || "New Track";
        const rawTab = document.getElementById('tab-input').value;
        const stringMap = { 'e':0, 'B':1, 'G':2, 'D':3, 'A':4, 'E':5 };
        let tempNotes = [];

        if(!rawTab.trim()) { alert("Please paste tab content."); return; }

        const lines = rawTab.split('\n');
        lines.forEach(line => {
            let cleanLine = line.trim();
            if (cleanLine.length > 0 && stringMap[cleanLine.charAt(0)] !== undefined) {
                let sIdx = stringMap[cleanLine.charAt(0)];
                for (let i = 0; i < line.length; i++) {
                    let char = line[i];
                    if (char >= '0' && char <= '9') {
                        let fNum = char;
                        if (i + 1 < line.length && line[i+1] >= '0' && line[i+1] <= '9') {
                            fNum += line[i+1]; i++;
                        }
                        tempNotes.push({ string: sIdx, fret: parseInt(fNum), time: 0, rawPos: i });
                    }
                }
            }
        });

        currentNotes = tempNotes.sort((a, b) => a.rawPos - b.rawPos);
        if (currentNotes.length > 0) {
            document.getElementById('rec-btn').style.display = 'flex';
            alert("Success: " + currentNotes.length + " notes parsed.");
        }
    }

    function startRecording() {
        let count = 3;
        document.getElementById('rec-btn').style.display = 'none';
        const timer = setInterval(() => {
            document.getElementById('countdown').textContent = count > 0 ? count : (count === 0 ? "GO!" : "");
            if (count === -1) {
                clearInterval(timer);
                document.getElementById('countdown').textContent = "";
                isRecording = true; currentTapIndex = 0; recordingStartTime = performance.now();
                document.getElementById('tap-btn').style.display = 'flex';
                document.getElementById('stop-btn').style.display = 'flex';
            }
            count--;
        }, 800);
    }

    function handleTap(e) {
        if (e) e.preventDefault();
        if (!isRecording || currentTapIndex >= currentNotes.length) return;
        currentNotes[currentTapIndex].time = performance.now() - recordingStartTime;
        currentTapIndex++;
        if (currentTapIndex === currentNotes.length) stopRecording();
    }

    function stopRecording() {
        isRecording = false;
        document.getElementById('tap-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('bake-btn').style.display = 'flex';
    }

    function drawAdmin() {
        const canvas = document.getElementById('game-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (canvas.width !== canvas.clientWidth) { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const hX = 120;
        for (let i = 1; i <= 6; i++) {
            let y = (canvas.height / 7) * i;
            ctx.strokeStyle = i > 3 ? "#444" : "#222"; ctx.lineWidth = i > 3 ? 4 : 2;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
        ctx.strokeStyle = "#4CAF50"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(hX, 0); ctx.lineTo(hX, canvas.height); ctx.stroke();
        if (isRecording && currentTapIndex < currentNotes.length) {
            let note = currentNotes[currentTapIndex];
            let y = (canvas.height / 7) * (note.string + 1);
            ctx.fillStyle = "rgba(76, 175, 80, 0.5)"; ctx.beginPath(); ctx.arc(hX + 50, y, 25, 0, Math.PI * 2); ctx.fill();
        }
        requestAnimationFrame(drawAdmin);
    }
    drawAdmin();

    function bakePlayer() {
        const songJSON = JSON.stringify(currentNotes.map(n => ({s:n.string, f:n.fret, t:n.time})));
        const ytIn = document.getElementById('yt-url').value;
        let yId = "";
        if (ytIn.includes("v=")) yId = ytIn.split("v=")[1].split("&")[0];
        else if (ytIn.includes("youtu.be/")) yId = ytIn.split("youtu.be/")[1].split("?")[0];

        const pHtml = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAYER: \${songName}</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #h { height: 50px; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #4CAF50; background: #111; font-weight: bold; }
        #v { flex: 1; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; position: absolute; z-index: 5; pointer-events: none; }
        #yt { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 0.5s; position: absolute; top: 0; left: 0; }
        #ov { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 100; }
        .pb { padding: 20px 40px; background: #4CAF50; color: #000; border: none; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; }
        #ctrl { height: 80px; background: #111; display: flex; align-items: center; padding: 0 10px; gap: 10px; border-top: 2px solid #222; }
        .cb { flex: 1; padding: 15px; background: #333; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .stop { background: #F44336; }
        .active { background: #4CAF50; color: #000; }
    </style>
</head>
<body id="pb" data-song='\${songJSON}'>
    <div id="h">\${songName.toUpperCase()}</div>
    <div id="v"><div id="yt"></div><canvas id="pc"></canvas><div id="ov"><button class="pb" onclick="start()">START SESSION</button></div></div>
    <div id="ctrl">
        <button class="cb" onclick="spd(0.5, this)">0.5x</button>
        <button class="cb active" onclick="spd(1.0, this)">1.0x</button>
        <button id="pp" class="cb" onclick="togP()">PAUSE</button>
        <button class="cb stop" onclick="reset()">STOP</button>
    </div>
<script src="https://www.youtube.com/iframe_api"></scrip` + `t>
<script>
    let data = [];
    const freqs = [329.63, 246.94, 196.0, 146.8, 110.0, 82.4];
    let play = false, startT = 0, pausedT = 0, speed = 1.0, showV = false, ac, an, dArr, ytp;

    function onYouTubeIframeAPIReady() {
        if("\${yId}") {
            ytp = new YT.Player('yt', {
                videoId: '\${yId}',
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'modestbranding': 1 },
                events: { 'onReady': () => console.log("YT Ready") }
            });
        }
    }

    async function start() {
        const raw = document.getElementById('pb').getAttribute('data-song');
        data = JSON.parse(raw);
        ac = new (window.AudioContext || window.webkitAudioContext)();
        if (ac.state === 'suspended') await ac.resume();
        try {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            const src = ac.createMediaStreamSource(s);
            an = ac.createAnalyser(); an.fftSize = 2048;
            src.connect(an); dArr = new Float32Array(an.fftSize);
        } catch (e) { console.warn("Mic Off"); }
        document.getElementById('ov').style.display = 'none';
        play = true; startT = performance.now();
        if(ytp && ytp.playVideo) ytp.playVideo();
        data.forEach(n => { n.p = false; n.h = false; });
    }

    function reset() {
        play = false;
        document.getElementById('ov').style.display = 'flex';
        if(ytp) { ytp.stopVideo(); ytp.seekTo(0); }
        document.getElementById('pp').textContent = "PAUSE";
    }

    function togP() {
        play = !play;
        document.getElementById('pp').textContent = play ? "PAUSE" : "PLAY";
        if(ytp) play ? ytp.playVideo() : ytp.pauseVideo();
        if(!play) pausedT = performance.now() - startT;
        else startT = performance.now() - pausedT;
    }

    function spd(s, b) {
        speed = s;
        document.querySelectorAll('.cb').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        if(ytp) ytp.setPlaybackRate(s);
    }

    function pNote(s, f) {
        if (!ac) return;
        const o = ac.createOscillator(); const g = ac.createGain();
        o.type = 'triangle'; o.frequency.setValueAtTime(freqs[s] * Math.pow(2, f / 12), ac.currentTime);
        g.gain.setValueAtTime(0.2, ac.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.6);
        o.connect(g); g.connect(ac.destination);
        o.start(); o.stop(ac.currentTime + 0.6);
    }

    function getP() {
        if (!an) return 0;
        an.getFloatTimeDomainData(dArr);
        let rms = 0; for (let i = 0; i < dArr.length; i++) rms += dArr[i] * dArr[i];
        if (Math.sqrt(rms / dArr.length) < 0.015) return 0;
        let bR = 0, bP = -1;
        for (let p = 40; p < 500; p++) {
            let r = 0; for (let i = 0; i < dArr.length - p; i++) r += dArr[i] * dArr[i + p];
            if (r > bR) { bR = r; bP = p; }
        }
        return ac.sampleRate / bP;
    }

    function run() {
        const c = document.getElementById('pc'); const x = c.getContext('2d');
        if (c.width !== c.clientWidth) { c.width = c.clientWidth; c.height = c.clientHeight; }
        x.clearRect(0, 0, c.width, c.height);
        const now = play ? (performance.now() - startT) * speed : pausedT * speed;
        const hX = 120; let cp = getP(); let bg = "#000";
        for (let i = 1; i <= 6; i++) {
            let y = (c.height / 7) * i; x.strokeStyle = "#222"; x.lineWidth = i > 3 ? 4 : 2;
            x.beginPath(); x.moveTo(0, y); x.lineTo(c.width, y); x.stroke();
        }
        x.strokeStyle = "#4CAF50"; x.lineWidth = 4;
        x.beginPath(); x.moveTo(hX, 0); x.lineTo(hX, canvas.height); x.stroke();
        
        let allFinished = true;
        data.forEach(n => {
            let px = hX + ((n.t - now) * 0.35);
            if (px > -50) allFinished = false; 
            
            let tf = freqs[n.s] * Math.pow(2, n.f / 12);
            if (play && px <= hX && !n.p) { pNote(n.s, n.f); n.p = true; }
            if (play && Math.abs(px - hX) < 25 && !n.h && cp > 0) {
                if (Math.abs(cp - tf) < tf * 0.1) n.h = true;
                else bg = "#300";
            }
            if (px > -100 && px < c.width + 100) {
                let y = (c.height / 7) * (n.s + 1);
                x.fillStyle = n.h ? "#FFF" : "#4CAF50";
                x.beginPath(); x.roundRect(px-35, y-30, 70, 60, 15); x.fill();
                x.fillStyle = "#000"; x.textAlign = "center"; x.font = "bold 30px Arial";
                x.fillText(n.f, px, y + 10);
            }
        });

        if (play && allFinished && (now - data[data.length-1].t) > 1500) {
            startT = performance.now();
            if(ytp) ytp.seekTo(0);
            data.forEach(n => { n.p = false; n.h = false; });
        }

        document.body.style.background = bg;
        requestAnimationFrame(run);
    }
    run();
</scrip` + `t>
</body>
</html>`;

        const blob = new Blob([pHtml], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = songName.toLowerCase().replace(/ /g, '-') + ".html";
        a.click();
    }
</script>
</body>
</html>
