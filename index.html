<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guitar Studio: Master V6.2</title>
    <style>
        /* Styles remain the same for consistency with your V5.9 setup */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        body { width: 100vw; height: 100vh; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; position: relative; }
        #song-header { height: 50px; background: #0a0a0a; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #4CAF50; color: #4CAF50; font-size: 18px; text-transform: uppercase; }
        #game-area { flex: 1; position: relative; background: #050505; }
        #game-canvas { width: 100%; height: 100%; display: block; }
        #control-panel { height: 140px; background: #111; display: flex; padding: 15px; gap: 15px; }
        .big-btn { flex: 1; height: 100%; border: none; border-radius: 20px; font-size: 28px; font-weight: bold; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .btn-green { background: #4CAF50; }
        .btn-red { background: #F44336; color: #fff; }
        .btn-cyan { background: #00BCD4; font-size: 16px; flex: 0.5; }
        .hidden { display: none !important; }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 160px; color: #4CAF50; z-index: 100; text-shadow: 0 0 20px #000; }
    </style>
</head>
<body>
    <div id="song-header">STUDIO READY</div>
    <div id="game-area">
        <div id="countdown"></div>
        <canvas id="game-canvas"></canvas>
    </div>
    <div id="control-panel">
        <button id="speed-btn" class="big-btn btn-cyan" onclick="toggleSpeed()">SPEED: 1x</button>
        <button id="play-btn" class="big-btn btn-green" onclick="startSong()">▶ START</button>
        <button id="stop-btn" class="big-btn btn-red hidden" onclick="stopSong()">STOP</button>
    </div>

<script>
    // --- 1. THE SOUND ENGINE ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playNote(stringIdx, fret) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        // Frequencies for e, B, G, D, A, E
        const baseFreqs = [329.63, 246.94, 196.00, 146.83, 110.00, 82.41];
        const freq = baseFreqs[stringIdx] * Math.pow(2, fret / 12);
        
        osc.type = 'triangle'; // Smoother than 'sine', less harsh than 'saw'
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.6);
    }

    // --- 2. DATA & GAME LOGIC ---
    // Placeholder data - replace this with your actual recorded SONG_DATA
    const SONG_DATA = [
        {s: 2, f: 2, t: 1000}, {s: 1, f: 1, t: 1500}, {s: 1, f: 3, t: 2000}
    ]; 

    let isPlaying = false, startTime = 0, speedMult = 1.0;

    function toggleSpeed() {
        speedMult = (speedMult === 1.0) ? 0.5 : 1.0;
        document.getElementById('speed-btn').textContent = 'SPEED: ' + speedMult + 'x';
    }

    function startSong() {
        // Unlock audio context on click
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        // Reset "played" status for all notes
        SONG_DATA.forEach(n => n.played = false);
        
        let count = 3;
        const cd = document.getElementById('countdown');
        document.getElementById('play-btn').classList.add('hidden');
        
        const timer = setInterval(() => {
            cd.textContent = count > 0 ? count : "GO!";
            if(count === -1) {
                clearInterval(timer);
                cd.textContent = "";
                isPlaying = true;
                startTime = performance.now();
                document.getElementById('stop-btn').classList.remove('hidden');
            }
            count--;
        }, 800);
    }

    function stopSong() {
        isPlaying = false;
        document.getElementById('stop-btn').classList.add('hidden');
        document.getElementById('play-btn').classList.remove('hidden');
    }

    function draw() {
        const canvas = document.getElementById('game-canvas');
        if(canvas.width !== canvas.clientWidth) {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        const now = (isPlaying ? performance.now() - startTime : -1000) * speedMult;
        const hitX = 120;

        // Draw Strings
        for(let i=1; i<=6; i++) {
            let y = (canvas.height/7)*i;
            ctx.strokeStyle = "#333";
            ctx.lineWidth = i > 3 ? 5 : 2;
            ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();
        }

        // Draw Hit Line
        ctx.strokeStyle = "#4CAF50";
        ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(hitX,0); ctx.lineTo(hitX,canvas.height); ctx.stroke();

        // Draw & Play Notes
        SONG_DATA.forEach((n) => {
            let timeDiff = n.t - now;
            let x = hitX + (timeDiff * 0.35);
            
            if(x > -100 && x < canvas.width + 100) {
                let y = (canvas.height/7)*(n.s+1);
                
                // --- TRIGGER SOUND ---
                if (isPlaying && x <= hitX && !n.played) {
                    playNote(n.s, n.f);
                    n.played = true; 
                }

                ctx.fillStyle = (n.played) ? "#fff" : "#4CAF50";
                ctx.beginPath();
                ctx.roundRect(x-45, y-40, 90, 80, 20);
                ctx.fill();
                
                ctx.fillStyle = "#000";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "bold 45px Arial";
                ctx.fillText(n.f, x, y);
            }
        });
        requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
</script>
</body>
</html>
