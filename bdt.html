
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAZ-TECH: Admin Studio V3.2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { width: 100vw; height: 100vh; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        #admin-panel { height: 55%; background: #111; border-bottom: 3px solid #4CAF50; padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .input-row { display: flex; gap: 10px; }
        input, textarea { background: #000; color: #4CAF50; border: 1px solid #333; padding: 12px; font-family: 'Courier New', monospace; border-radius: 5px; font-size: 14px; outline: none; }
        textarea { flex: 1; resize: none; border-color: #222; }
        #game-area { flex: 1; position: relative; background: #050505; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; color: #FFD600; font-weight: bold; pointer-events: none; text-shadow: 0 0 20px rgba(255,214,0,0.5); }
    #controls { height: 110px; background: #111; display: flex; padding: 10px; gap: 10px; border-top: 1px solid #1a1a1a; flex-wrap: wrap; }
        .btn { flex: 1; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: opacity 0.2s; min-width: 100px; }
        .btn:active { opacity: 0.7; }
        .btn-load { background: #4CAF50; color: #000; }
        .btn-rec { background: #FFD600; color: #000; }
        .btn-prev { background: #9C27B0; color: #fff; }
        .btn-tap { background: #FFD600; color: #000; font-size: 28px; display: none; box-shadow: 0 0 15px #FFD600; }
        .btn-bake { background: #E91E63; color: #fff; }
        .btn-stop { background: #F44336; color: #fff; display: none; }

        #fs-btn {
            position: fixed; top: 8px; right: 8px; z-index: 999;
            background: #333; color: #fff; border: none;
            border-radius: 6px; padding: 8px 12px; font-size: 18px;
            cursor: pointer; opacity: 0.8; font-family: monospace;
        }
        #fs-btn:hover { opacity: 1; }
        body.fs-mode #admin-panel { display: none !important; }
        body.fs-mode #controls { display: none !important; }
        body.fs-mode #game-area { height: 100vh !important; }
        body.fs-mode #fs-btn { background: #E91E63; }
    </style>
</head>
<body>

    <button id="fs-btn" onclick="toggleFS()" title="Fullscreen">⛶</button>

    <div id="admin-panel">
        <div class="input-row">
            <input id="in-name" style="flex:1" placeholder="SONG NAME">
            <input id="yt-url" style="flex:1.5" placeholder="YouTube URL (Optional)">
            <input id="bt-url" style="flex:1.5" placeholder="Backing Track URL (Optional)">
            <button class="btn btn-load" onclick="loadTab()">1. LOAD TAB</button>
        </div>
        <textarea id="tab-input" placeholder="Paste Guitar Tab here..."></textarea>
        <div class="input-row" style="margin-top: 10px;">
            <span style="color: #4CAF50; font-weight: bold; padding: 12px;">TIMING MODE:</span>
            <button class="btn timing-btn active" onclick="setTimingMode('tap')" style="background: #4CAF50; color: #000; flex: 0.8;">TAP</button>
            <button class="btn timing-btn" onclick="setTimingMode('bpm')" style="background: #FFD600; color: #000; flex: 0.8;">BPM</button>
            <button class="btn timing-btn" onclick="setTimingMode('manual')" style="background: #FF9800; color: #000; flex: 0.8;">MANUAL</button>
        </div>
    </div>

    <audio id="backing-track" style="display:none;"></audio>

    <div id="game-area">
        <div id="countdown"></div>
        <canvas id="game-canvas"></canvas>
    </div>

    <div id="controls">
        <button id="rec-btn" class="btn btn-rec" style="display:none;" onclick="startRecording()">2. RECORD RHYTHM</button>
        <button id="prev-btn" class="btn btn-prev" style="display:none;" onclick="startPreview()">▶ PREVIEW</button>
        <button id="tap-btn" class="btn btn-tap" onmousedown="handleTap(event)" ontouchstart="handleTap(event)">TAP!</button>
        <button id="bake-btn" class="btn btn-bake" onclick="bakePlayer()">3. BAKE PLAYER (AUTO-LOOP)</button>
        <button id="stop-btn" class="btn btn-stop" onclick="stopRecording()">STOP</button>
    </div>

<script>
    let currentNotes = [], songName = "", isRecording = false, recordingStartTime = 0, currentTapIndex = 0;
    let timingMode = 'tap'; // 'tap', 'bpm', or 'manual'
    let bpmValue = 120;
    let isPreviewMode = false, previewStartTime = 0, previewSpeed = 1.0;
    let tabSections = []; // Store raw tab for visualization
    let tabLoaded = false;
    let previewAC = null; // Audio context for preview
    let previewNotes = {}; // Track which notes have been played
    let backingTrackAudio = null; // Audio element for backing track
    let backingTrackUrl = ""; // URL of backing track

    function setTimingMode(mode) {
        timingMode = mode;
        document.querySelectorAll('.timing-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        if (mode === 'bpm') {
            const bpm = prompt("Enter BPM:", bpmValue);
            if (bpm && !isNaN(bpm)) {
                bpmValue = parseInt(bpm);
                // Calculate timing based on BPM
                const beatDuration = (60000 / bpmValue) / 2; // Adjust divisor for note density
                currentNotes.forEach((n, idx) => {
                    n.time = idx * beatDuration;
                });
                alert("BPM set to " + bpmValue + ". Timings calculated!");
            }
        }
    }

    async function loadBackingTrack() {
        const url = document.getElementById('bt-url').value.trim();
        if (!url) {
            console.log("ℹ️ No backing track URL provided");
            return;
        }
        
        console.log("⏳ Loading backing track from:", url);
        
        try {
            backingTrackAudio = document.getElementById('backing-track');
            backingTrackAudio.crossOrigin = "anonymous";
            
            // Try multiple CORS proxies
            let attempts = [
                { url: url, name: "Direct URL" }
            ];
            
            // Add CORS proxies for problematic URLs (GitHub, etc)
            if (url.includes('github.com') || url.includes('githubusercontent.com')) {
                attempts.push(
                    { url: 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url), name: "AllOrigins Proxy" },
                    { url: 'https://cors-anywhere.herokuapp.com/' + url, name: "CORS Anywhere" },
                    { url: 'https://corsproxy.io/?' + url, name: "CORSProxy.io" }
                );
            }
            
            let loaded = false;
            let lastError = null;
            
            for (let attempt of attempts) {
                try {
                    console.log(`  Trying ${attempt.name}...`);
                    backingTrackAudio.src = attempt.url;
                    
                    await new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => {
                            reject(new Error(`${attempt.name} timed out (10s)`));
                        }, 10000);
                        
                        backingTrackAudio.oncanplay = () => {
                            clearTimeout(timeout);
                            console.log(`  ✓ ${attempt.name} loaded successfully`);
                            resolve();
                        };
                        
                        backingTrackAudio.onerror = (e) => {
                            clearTimeout(timeout);
                            reject(new Error(`${attempt.name} blocked by CORS or server error`));
                        };
                        
                        // Trigger loading
                        backingTrackAudio.load();
                    });
                    
                    loaded = true;
                    backingTrackUrl = attempt.url;
                    console.log("✅ Backing track loaded successfully!");
                    break;
                } catch (attemptError) {
                    console.warn(`  ✗ ${attempt.name} failed:`, attemptError.message);
                    lastError = attemptError;
                }
            }
            
            if (!loaded) {
                throw lastError || new Error("All load attempts failed");
            }
        } catch (e) {
            console.error("❌ Failed to load backing track:", e.message);
            console.log("💡 CORS Issue: GitHub blocks direct audio access");
            console.log("📌 SOLUTION: Upload your MP3 to one of these instead:");
            console.log("   • Dropbox (share link, add ?dl=1)");
            console.log("   • Google Drive (right-click → Share)");
            console.log("   • OneDrive");
            console.log("   • Any public S3/hosting with CORS enabled");
            backingTrackUrl = "";
        }
    }

    function loadTab() {
        songName = document.getElementById('in-name').value || "New Track";
        const rawTab = document.getElementById('tab-input').value;
        const stringMap = { 'e':0, 'B':1, 'G':2, 'D':3, 'A':4, 'E':5 };
        let tempNotes = [];

        if(!rawTab.trim()) { alert("Please paste tab content."); return; }

        const lines = rawTab.split('\n');
        
        // Group lines into sections (blocks of 6 consecutive string lines)
        let sections = [];
        let currentSection = [];
        
        lines.forEach(line => {
            let cleanLine = line.trim();
            if (cleanLine.length > 0 && stringMap[cleanLine.charAt(0)] !== undefined) {
                currentSection.push(line);
                if (currentSection.length === 6) {
                    sections.push(currentSection);
                    currentSection = [];
                }
            } else if (currentSection.length > 0 && cleanLine.length === 0) {
                if (currentSection.length > 0) {
                    sections.push(currentSection);
                    currentSection = [];
                }
            }
        });
        if (currentSection.length > 0) sections.push(currentSection);

        // Store sections for visualization
        tabSections = sections;

        // Process each section - parse columns and handle multi-digit frets
        let globalPosOffset = 0; // Track position across sections
        sections.forEach(section => {
            let maxCols = 0;
            section.forEach(line => {
                maxCols = Math.max(maxCols, line.length);
            });
            
            let col = 0;
            while (col < maxCols) {
                let colNotes = []; // Notes at this column position
                let maxDigitsSkip = 1;
                
                section.forEach(line => {
                    if (col >= line.length) return;
                    
                    let char = line[col];
                    let sIdx = stringMap[line.trim().charAt(0)];
                    
                    if (char >= '0' && char <= '9') {
                        let fNum = char;
                        let checkCol = col + 1;
                        
                        // Look ahead for multi-digit frets
                        while (checkCol < line.length && line[checkCol] >= '0' && line[checkCol] <= '9') {
                            fNum += line[checkCol];
                            checkCol++;
                        }
                        
                        maxDigitsSkip = Math.max(maxDigitsSkip, fNum.length);
                        // rawPos is now unique across all sections
                        colNotes.push({ string: sIdx, fret: parseInt(fNum), time: 0, rawPos: globalPosOffset + col });
                    }
                });
                
                // Add all notes from this column as simultaneous
                tempNotes = tempNotes.concat(colNotes);
                col += maxDigitsSkip;
            }
            
            // Move offset for next section - add extra for spacing between sections
            globalPosOffset += maxCols + 20;
        });

        currentNotes = tempNotes;
        tabLoaded = true;
        if (currentNotes.length > 0) {
            document.getElementById('rec-btn').style.display = 'flex';
            document.getElementById('prev-btn').style.display = 'flex';
            alert("Success: " + currentNotes.length + " notes parsed and loaded!");
        }
    }

    function playPreviewNote(string, fret) {
        if (!previewAC) {
            previewAC = new (window.AudioContext || window.webkitAudioContext)();
        }
        const freqs = [329.63, 246.94, 196.0, 146.8, 110.0, 82.4];
        const o = previewAC.createOscillator();
        const g = previewAC.createGain();
        o.type = 'triangle';
        o.frequency.setValueAtTime(freqs[string] * Math.pow(2, fret / 12), previewAC.currentTime);
        g.gain.setValueAtTime(0.15, previewAC.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, previewAC.currentTime + 0.5);
        o.connect(g);
        g.connect(previewAC.destination);
        o.start();
        o.stop(previewAC.currentTime + 0.5);
    }

    function startPreview() {
        isPreviewMode = true;
        previewStartTime = performance.now();
        previewNotes = {}; // Reset played notes tracker
        document.getElementById('rec-btn').style.display = 'none';
        document.getElementById('prev-btn').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'flex';
        document.getElementById('countdown').textContent = "PREVIEW";
        setTimeout(() => {
            document.getElementById('countdown').textContent = "";
        }, 500);
        
        // Load and play backing track
        loadBackingTrack().then(() => {
            if (backingTrackUrl) {
                const audio = document.getElementById('backing-track');
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Play error:", e));
            }
        });
    }

    function stopPreview() {
        isPreviewMode = false;
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('rec-btn').style.display = 'flex';
        document.getElementById('prev-btn').style.display = 'flex';
        
        // Stop backing track
        const audio = document.getElementById('backing-track');
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
        }
    }

    function startRecording() {
        if (timingMode === 'tap') {
            // Original TAP MODE with countdown
            let count = 3;
            document.getElementById('rec-btn').style.display = 'none';
            const timer = setInterval(() => {
                document.getElementById('countdown').textContent = count > 0 ? count : (count === 0 ? "GO!" : "");
                if (count === -1) {
                    clearInterval(timer);
                    document.getElementById('countdown').textContent = "";
                    isRecording = true; currentTapIndex = 0; recordingStartTime = performance.now();
                    document.getElementById('tap-btn').style.display = 'flex';
                    document.getElementById('stop-btn').style.display = 'flex';
                    
                    // Load and play backing track
                    loadBackingTrack().then(() => {
                        if (backingTrackUrl) {
                            const audio = document.getElementById('backing-track');
                            audio.currentTime = 0;
                            audio.play().catch(e => console.log("Play error:", e));
                        }
                    });
                }
                count--;
            }, 800);
        } else if (timingMode === 'bpm') {
            // BPM MODE - auto-calculated, just play
            document.getElementById('rec-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'flex';
            document.getElementById('bake-btn').style.display = 'flex';
        } else if (timingMode === 'manual') {
            // MANUAL MODE - show draggable timeline
            document.getElementById('rec-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'flex';
            document.getElementById('bake-btn').style.display = 'flex';
            showManualTimingUI();
        }
    }

    function showManualTimingUI() {
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        // Draw a timeline at the bottom
        const timelineY = canvas.height - 80;
        ctx.fillStyle = "#222";
        ctx.fillRect(0, timelineY, canvas.width, 70);
        ctx.strokeStyle = "#4CAF50";
        ctx.lineWidth = 2;
        ctx.strokeRect(10, timelineY + 10, canvas.width - 20, 50);
        
        // Draw draggable note pills
        currentNotes.forEach((note, idx) => {
            const x = 20 + (idx / currentNotes.length) * (canvas.width - 40);
            const y = timelineY + 25;
            ctx.fillStyle = "#FFD600";
            ctx.beginPath();
            ctx.roundRect(x - 15, y - 12, 30, 24, 5);
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.textAlign = "center";
            ctx.font = "bold 10px Arial";
            ctx.fillText(note.fret, x, y + 4);
            
            // Store draggable data
            note.uiX = x;
            note.uiY = y;
        });
    }

    function handleTap(e) {
        if (e) e.preventDefault();
        if (!isRecording || currentTapIndex >= currentNotes.length) return;
        currentNotes[currentTapIndex].time = performance.now() - recordingStartTime;
        currentTapIndex++;
        if (currentTapIndex === currentNotes.length) stopRecording();
    }

    function stopRecording() {
        if (isPreviewMode) {
            stopPreview();
        } else {
            isRecording = false;
            document.getElementById('tap-btn').style.display = 'none';
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('bake-btn').style.display = 'flex';
            
            // Stop backing track
            const audio = document.getElementById('backing-track');
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
        }
    }

    function drawAdmin() {
        const canvas = document.getElementById('game-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (canvas.width !== canvas.clientWidth) { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const hX = 120;
        
        // String names and colors
        const strings = ['e', 'B', 'G', 'D', 'A', 'E'];
        const stringColors = ['#FF6B6B', '#FF8E72', '#FFA500', '#FFD700', '#87CEEB', '#9370DB'];
        
        for (let i = 1; i <= 6; i++) {
            let y = (canvas.height / 7) * i;
            let color = stringColors[i - 1];
            ctx.strokeStyle = color;
            ctx.lineWidth = i > 3 ? 4 : 2;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
            
            // Draw string label on the left
            ctx.fillStyle = color;
            ctx.textAlign = "center";
            ctx.font = "bold 14px Arial";
            ctx.fillText(strings[i - 1], hX / 2, y + 5);
        }
        
        ctx.strokeStyle = "#4CAF50"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(hX, 0); ctx.lineTo(hX, canvas.height); ctx.stroke();
        
        // Draw loaded tab on the strings
        if (tabLoaded && tabSections.length > 0) {
            let xPos = hX + 20;
            const stringMap = { 'e':0, 'B':1, 'G':2, 'D':3, 'A':4, 'E':5 };
            
            tabSections.forEach((section, sectionIdx) => {
                let sectionStartX = xPos;
                let maxSectionWidth = 0;
                
                section.forEach((line, lineIdx) => {
                    let trimmedLine = line.trim();
                    let stringChar = trimmedLine.charAt(0);
                    let sIdx = stringMap[stringChar];
                    
                    if (sIdx !== undefined) {
                        let y = (canvas.height / 7) * (sIdx + 1);
                        
                        // Draw the tab text on the string
                        ctx.fillStyle = stringColors[sIdx];
                        ctx.font = "bold 20px Courier New";
                        ctx.textAlign = "left";
                        
                        // Draw frets from the section (skip the string letter at start)
                        let colX = sectionStartX;
                        for (let i = 1; i < trimmedLine.length; i++) {
                            let char = trimmedLine[i];
                            if (char >= '0' && char <= '9') {
                                let fNum = char;
                                let nextI = i + 1;
                                while (nextI < trimmedLine.length && trimmedLine[nextI] >= '0' && trimmedLine[nextI] <= '9') {
                                    fNum += trimmedLine[nextI];
                                    nextI++;
                                }
                                ctx.fillText(fNum, colX, y + 6);
                                colX += fNum.length * 12;
                                i = nextI - 1;
                            } else if (char === '-' || char === '|' || char === ' ') {
                                colX += 8;
                            }
                        }
                        
                        // Track the actual width needed for this section
                        maxSectionWidth = Math.max(maxSectionWidth, colX - sectionStartX);
                    }
                });
                
                // Move xPos for next section with actual width + gap
                xPos = sectionStartX + maxSectionWidth + 40;
            });
        }
        
        if (timingMode === 'manual' && document.getElementById('stop-btn').style.display !== 'none') {
            // Show manual timing UI
            const timelineY = canvas.height - 100;
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(0, timelineY, canvas.width, 100);
            ctx.strokeStyle = "#4CAF50";
            ctx.lineWidth = 2;
            ctx.strokeRect(10, timelineY + 20, canvas.width - 20, 50);
            
            ctx.fillStyle = "#666";
            ctx.font = "12px Arial";
            ctx.textAlign = "left";
            ctx.fillText("Drag notes left/right to adjust timing", 15, timelineY + 12);
            
            // Draw draggable note pills
            currentNotes.forEach((note, idx) => {
                // Scale note.time (0-5000ms) to canvas width
                const timelineStart = 30;
                const timelineWidth = canvas.width - 60;
                const normalizedTime = Math.min(1, (note.time || 0) / 5000);
                const x = timelineStart + (normalizedTime * timelineWidth);
                const y = timelineY + 45;
                
                ctx.fillStyle = stringColors[note.string];
                ctx.beginPath();
                ctx.roundRect(x - 18, y - 14, 36, 28, 5);
                ctx.fill();
                ctx.fillStyle = "#000";
                ctx.textAlign = "center";
                ctx.font = "bold 12px Arial";
                ctx.fillText(note.fret, x, y + 5);
                
                note.uiX = x;
                note.uiY = y;
                note.uiR = 18;
            });
        } else if (isRecording && currentTapIndex < currentNotes.length) {
            let note = currentNotes[currentTapIndex];
            let y = (canvas.height / 7) * (note.string + 1);
            ctx.fillStyle = "rgba(76, 175, 80, 0.5)"; ctx.beginPath(); ctx.arc(hX + 50, y, 25, 0, Math.PI * 2); ctx.fill();
        } else if (isPreviewMode) {
            // Preview mode - show notes flowing across the screen
            const now = performance.now() - previewStartTime;
            
            // Check if notes have actual timing or need auto-spacing
            let hasRealTiming = currentNotes.some(n => n.time > 0);
            
            // Group notes by their rawPos to identify chords
            let noteGroups = {};
            currentNotes.forEach((note, idx) => {
                let key = note.rawPos || idx;
                if (!noteGroups[key]) noteGroups[key] = [];
                noteGroups[key].push(note);
            });
            let uniquePositions = Object.keys(noteGroups).length;
            
            currentNotes.forEach((note, idx) => {
                // If no timing set yet, auto-space notes based on their unique position
                let noteTime = note.time;
                if (!hasRealTiming) {
                    let posKey = note.rawPos || idx;
                    let posIndex = Object.keys(noteGroups).indexOf(String(posKey));
                    // Space unique positions out over 8 seconds
                    noteTime = (posIndex / Math.max(1, uniquePositions - 1)) * 8000;
                    note.time = noteTime; // Update for consistency
                }
                
                // Play note when it crosses the playhead
                const noteKey = `${note.rawPos}-${note.string}-${note.fret}`;
                if (!previewNotes[noteKey] && noteTime <= now && now < noteTime + 100) {
                    playPreviewNote(note.string, note.fret);
                    previewNotes[noteKey] = true;
                }
                
                // Slower scroll speed - use 0.15 instead of 0.35
                let px = hX + ((noteTime - now) * 0.15);
                if (px > -100 && px < canvas.width + 100) {
                    let y = (canvas.height / 7) * (note.string + 1);
                    ctx.fillStyle = stringColors[note.string];
                    ctx.beginPath();
                    ctx.roundRect(px - 35, y - 30, 70, 60, 15);
                    ctx.fill();
                    ctx.fillStyle = "#000";
                    ctx.textAlign = "center";
                    ctx.font = "bold 30px Arial";
                    ctx.fillText(note.fret, px, y + 10);
                }
            });
            
            // Check if preview is done
            let maxTime = hasRealTiming 
                ? Math.max(...currentNotes.map(n => n.time || 0))
                : 8000;
            if (now > maxTime + 1000) {
                stopPreview();
            }
        }
        requestAnimationFrame(drawAdmin);
    }
    drawAdmin();

    function bakePlayer() {
        const songJSON = JSON.stringify(currentNotes.map(n => ({s:n.string, f:n.fret, t:n.time})));
        const ytIn = document.getElementById('yt-url').value;
        const btIn = document.getElementById('bt-url').value;
        let yId = "";
        if (ytIn.includes("v=")) yId = ytIn.split("v=")[1].split("&")[0];
        else if (ytIn.includes("youtu.be/")) yId = ytIn.split("youtu.be/")[1].split("?")[0];

        const pHtml = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLAYER: ${songName}</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
