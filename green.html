<script>
    let data = [];
    const freqs = [329.63, 246.94, 196.0, 146.8, 110.0, 82.4];
    const AUDIO_LATENCY_MS = 120; // Tweak this value (50-200ms) to sync visuals with audio

    let backingTrackUrl = "", backingTrackLoaded = false;

    function setVolume(value) {

    }

    async function start() {
        const raw = document.getElementById('pb').getAttribute('data-song');
        backingTrackUrl = document.getElementById('pb').getAttribute('data-backing-track') || "";
        data = JSON.parse(raw);
        ac = new (window.AudioContext || window.webkitAudioContext)();
        if (ac.state === 'suspended') await ac.resume();
        document.getElementById('ov').style.display = 'none';
        document.getElementById('ctrl').style.display = 'flex';

        if(ytp && ytp.playVideo) ytp.playVideo();
        
        // Load and play backing track if available
        if (backingTrackUrl && backingTrackUrl.trim()) {
            try {
                const audioEl = document.getElementById('btrack');
                audioEl.src = backingTrackUrl;
                audioEl.crossOrigin = "anonymous";
                audioEl.currentTime = 0;
                await audioEl.play().catch(e => console.log("Backing track play error:", e));
                backingTrackLoaded = true;
            } catch (e) {
                console.log("Failed to load backing track:", e);
            }

        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
        
        data.forEach(n => { n.p = false; n.h = false; });
    }

    async function activateMic() {

        document.getElementById('pp').textContent = "PAUSE";
        document.getElementById('mic-btn').style.background = '#FF5722';
        document.getElementById('mic-btn').textContent = '🎤 MIC';

        else startT = performance.now() - pausedT;

        return ac.sampleRate / bP;
    }
